services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - ai-proxy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "3044:3044"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-merge_user}:${POSTGRES_PASSWORD:-merge_password}@db:5432/${POSTGRES_DB:-merge_auth}
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD_FILE=/run/secrets/email_password
      - SLACK_BOT_TOKEN_FILE=/run/secrets/slack_bot_token
      - SLACK_SIGNING_SECRET_FILE=/run/secrets/slack_signing_secret
      - SLACK_APP_TOKEN_FILE=/run/secrets/slack_app_token
    secrets:
      - telegram_bot_token
      - email_password
      - slack_bot_token
      - slack_signing_secret
      - slack_app_token
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm start"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3044/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-merge_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-merge_auth}
    secrets:
      - db_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-merge_user} -d ${POSTGRES_DB:-merge_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

secrets:
  telegram_bot_token:
    environment: "TELEGRAM_BOT_TOKEN"
  email_password:
    environment: "EMAIL_PASSWORD"
  slack_bot_token:
    environment: "SLACK_BOT_TOKEN"
  slack_signing_secret:
    environment: "SLACK_SIGNING_SECRET"
  slack_app_token:
    environment: "SLACK_APP_TOKEN"
  db_password:
    environment: "POSTGRES_PASSWORD"
