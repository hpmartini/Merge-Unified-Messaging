services:
  - type: web
    name: merge-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # Rewrite rules for SPA
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
      # On Render, frontend and backend are separate services.
      # You would update the proxy URL in vite.config.ts or make the frontend point to the ai-proxy URL directly.
      # Because static sites cannot act as a reverse proxy, the frontend needs to call the backend's absolute URL in production.

  - type: web
    name: merge-ai-proxy
    env: node
    buildCommand: npm ci --omit=dev
    startCommand: node server/ai-proxy.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Do not commit the secret, set it in Render dashboard
      - key: FRONTEND_URL
        value: https://merge-frontend.onrender.com