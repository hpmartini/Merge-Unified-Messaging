services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - ai-proxy
    restart: always

  ai-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "3044:3044"
    env_file:
      - .env.production
    restart: always
