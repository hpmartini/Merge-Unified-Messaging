
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merge | Unified Messaging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      
      /* THEMING SYSTEM */
      :root {
        /* Default: DARK (Slate - Deep Blue/Black) */
        --bg-base: #020617; /* slate-950 */
        --bg-panel: #0f172a; /* slate-900 */
        --bg-hover: #1e293b; /* slate-800 */
        --border: #1e293b; /* slate-800 */
        --text-main: #f1f5f9; /* slate-100 */
        --text-muted: #94a3b8; /* slate-400 */
        --scroll-track: #0f172a;
        --scroll-thumb: #334155;
      }

      [data-theme="dimmed"] {
        /* Dimmed (Zinc - Medium Dark Grey) */
        /* Significantly lighter than base dark mode */
        --bg-base: #27272a; /* zinc-800 */
        --bg-panel: #3f3f46; /* zinc-700 */
        --bg-hover: #52525b; /* zinc-600 */
        --border: #52525b; /* zinc-600 */
        --text-main: #f4f4f5; /* zinc-100 */
        --text-muted: #d4d4d8; /* zinc-300 */
        --scroll-track: #27272a;
        --scroll-thumb: #52525b;
      }

      [data-theme="light"] {
        /* Light (Slate/White) */
        --bg-base: #ffffff;
        --bg-panel: #f8fafc;
        --bg-hover: #e2e8f0;
        --border: #cbd5e1;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --scroll-track: #f1f5f9;
        --scroll-thumb: #cbd5e1;
      }

      /* Global Utility Overrides */
      .bg-theme-base { background-color: var(--bg-base); }
      .bg-theme-panel { background-color: var(--bg-panel); }
      .bg-theme-hover:hover { background-color: var(--bg-hover); }
      .border-theme { border-color: var(--border); }
      .text-theme-main { color: var(--text-main); }
      .text-theme-muted { color: var(--text-muted); }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--scroll-track); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted); 
      }

      /* Expanded Markdown Styles */
      .markdown-content p { margin-bottom: 0.75rem; }
      .markdown-content p:last-child { margin-bottom: 0; }
      
      .markdown-content h1, .markdown-content h2, .markdown-content h3 {
        color: var(--text-main);
        font-weight: 700;
        margin-top: 1.25rem;
        margin-bottom: 0.5rem;
        line-height: 1.2;
      }
      .markdown-content h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
      .markdown-content h2 { font-size: 1.25rem; }
      .markdown-content h3 { font-size: 1.125rem; }

      .markdown-content ul, .markdown-content ol {
        margin-bottom: 0.75rem;
        padding-left: 1.25rem;
      }
      .markdown-content ul { list-style-type: disc; }
      .markdown-content ol { list-style-type: decimal; }
      .markdown-content li { margin-bottom: 0.25rem; }

      .markdown-content blockquote {
        border-left: 3px solid #3b82f6;
        padding-left: 1rem;
        margin: 0.75rem 0;
        color: var(--text-muted);
        font-style: italic;
        background: rgba(59, 130, 246, 0.05);
        padding-top: 0.25rem;
        padding-bottom: 0.25rem;
      }

      .markdown-content a {
        color: #60a5fa;
        text-decoration: none;
        border-bottom: 1px dashed transparent;
        transition: border-color 0.2s;
      }
      .markdown-content a:hover {
        border-bottom-color: #60a5fa;
      }

      .markdown-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 0.75rem 0;
        font-size: 0.85rem;
      }
      .markdown-content th, .markdown-content td {
        border: 1px solid var(--border);
        padding: 0.4rem 0.6rem;
        text-align: left;
      }
      .markdown-content th {
        background-color: var(--bg-hover);
        color: var(--text-main);
        font-weight: 600;
      }
      .markdown-content tr:nth-child(even) {
        background-color: var(--bg-base);
      }

      .markdown-content hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 1rem 0;
      }

      .markdown-content code {
        font-family: 'JetBrains Mono', monospace;
        background-color: var(--bg-hover);
        padding: 0.15rem 0.35rem;
        border-radius: 0.375rem;
        font-size: 0.85em;
        color: var(--text-main);
      }
      .markdown-content pre {
        background-color: var(--bg-base);
        padding: 1rem;
        border-radius: 0.5rem;
        overflow-x: auto;
        margin: 0.75rem 0;
        border: 1px solid var(--border);
      }
      .markdown-content pre code {
        background-color: transparent;
        padding: 0;
        font-size: 0.8rem;
        display: block;
        color: var(--text-muted);
      }
      .markdown-content strong { color: var(--text-main); font-weight: 700; }
      .markdown-content em { font-style: italic; }
      .markdown-content del { text-decoration: line-through; opacity: 0.6; }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes zoomIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      
      .animate-in {
        animation-duration: 200ms;
        animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        animation-fill-mode: both;
      }
      .fade-in {
        animation-name: fadeIn;
      }
      .zoom-in {
        animation-name: zoomIn;
      }
    </style>
    <script>
      // Safety polyfill for process.env.API_KEY if not handled by the environment
      if (typeof process === 'undefined') {
        window.process = { env: {} };
      }
    </script>

{
  "imports": {

    "lucide-react": "https://esm.sh/lucide-react@0.263.1?deps=react@18.2.0",
    "react-markdown": "https://esm.sh/react-markdown@9.0.0?bundle&deps=react@18.2.0",
    "remark-gfm": "https://esm.sh/remark-gfm@4.0.0?bundle",
    "@google/genai": "https://esm.sh/@google/genai",

  }
}
</script>

</head>
  <body class="bg-theme-base text-theme-main transition-colors duration-300">

</body>
