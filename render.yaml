services:
  - type: web
    name: merge-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: merge-ai-proxy
    env: node
    buildCommand: npm ci --omit=dev
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://merge-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: merge-auth-db
          property: connectionString

databases:
  - name: merge-auth-db
    databaseName: merge_auth
    user: merge_user
    plan: free
    postgresMajorVersion: "16"
