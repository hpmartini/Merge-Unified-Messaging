services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - ai-proxy
    restart: unless-stopped

  ai-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "3044:3044"
    env_file:
      - .env.staging
    restart: unless-stopped
