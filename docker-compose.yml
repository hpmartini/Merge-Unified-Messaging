services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - ai-proxy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "3044:3044"
    env_file:
      - .env.staging
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-merge_user}:${POSTGRES_PASSWORD:-merge_password}@db:5432/${POSTGRES_DB:-merge_auth}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm start"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3044/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-merge_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-merge_password}
      POSTGRES_DB: ${POSTGRES_DB:-merge_auth}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-merge_user} -d ${POSTGRES_DB:-merge_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
