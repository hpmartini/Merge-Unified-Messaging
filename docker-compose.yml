services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - ai-proxy
    restart: unless-stopped

  ai-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "3044:3044"
    env_file:
      - .env.staging
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-merge_user}:${POSTGRES_PASSWORD:-merge_password}@db:5432/${POSTGRES_DB:-merge_auth}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm start"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-merge_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-merge_password}
      POSTGRES_DB: ${POSTGRES_DB:-merge_auth}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-merge_user} -d ${POSTGRES_DB:-merge_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
